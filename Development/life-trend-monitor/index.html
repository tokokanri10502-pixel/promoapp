<body>

    <!-- ヘッダー -->
    <header class="site-header">
        <div class="container">

                <i class="fa-solid fa-compass"></i>

            <nav class="main-nav">

                    <li><a href="#column-section">コラム</a></li>
                    <li><a href="#" id="nav-archive">アーカイブ</a></li>
                    <li class="nav-dropdown">
                        <a href="#" id="view-favorites"><i class="fa-solid fa-heart"></i> お気に入り <i
                                class="fa-solid fa-chevron-down nav-arrow"></i></a>
                        <ul class="dropdown-menu">

    <!-- ランキングセクション（今週の急上昇） -->

        <div class="container">
            <p class="section-lead">ライフスタイルの最新トレンドを毎日更新</p>
            <h2 class="section-title"><i class="fa-solid fa-crown" style="color: #f1c40f;"></i> 今週の急上昇トレンド</h2>
            <div class="ranking-grid" id="ranking-grid">

    <!-- ヒーロー / ピックアップ -->

        <div class="container">
            <div class="forecast-banner">

                </div>
                <a href="https://seikatsusoken.jp/" target="_blank" rel="noopener noreferrer" class="btn-forecast">
                    詳しく見る <i class="fa-solid fa-arrow-up-right-from-square"></i>
                </a>
            </div>
        </div>
    </section>

    <!-- カテゴリフィルター & 検索 -->
    <section class="filter-section">
        <div class="container">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="トレンドを検索（例：AI）">
            </div>

            <div class="filter-buttons">
                <button class="filter-btn active" data-category="all">すべて</button>
                <button class="filter-btn" data-category="wellness">ウェルネス</button>
                <button class="filter-btn" data-category="living">リビング</button>
                <button class="filter-btn" data-category="ladies">レディス</button>
                <button class="filter-btn" data-category="mens">メンズ</button>
                <button class="filter-btn" data-category="kids">キッズ</button>
                <button class="filter-btn" data-category="baby">ベビー</button>
                <button class="filter-btn" data-category="shoes">シューズ</button>
                <button class="filter-btn" data-category="work">ワークスタイル</button>
                <button class="filter-btn" data-category="cosme">コスメ</button>
                <button class="filter-btn" data-category="color">カラー</button>
                <button class="filter-btn" data-category="sns">SNS</button>
                <button class="filter-btn" data-category="temperature">気温予測</button>
            </div>
        </div>
    </section>

    <!-- ニュースグリッド -->
    <section class="news-section">
        <div class="container">
            <div id="news-grid" class="news-grid">
                <!-- JavaScriptでここに記事カードを生成 -->
            </div>

            <div class="archive-action" id="archive-action">
                <button id="load-archive-btn" class="btn-archive">
                    過去のトレンドを見る <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
        </div>
    </section>

    <!-- コラムセクション -->
    <section class="column-section" id="column-section">
        <div class="container">
            <h2 class="section-title"><i class="fa-solid fa-lightbulb" style="color: #3498db;"></i> 専門家コラム
            </h2>
            <p class="section-subtitle">ライフスタイルのプロが読み解く、トレンドの深層</p>
            <div class="column-grid" id="column-grid">
                <!-- JavaScriptでここにコラムカードを生成 -->
            </div>
        </div>
    </section>

    <!-- フッター -->
    <footer class="site-footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <span class="logo-accent">Life</span> Trend Monitor
                </div>
                <div class="copyright">
                    &copy; 2026 Life Trend Monitor. All Rights Reserved.
                </div>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
    <script>
        // ---- PWA アップデート通知 ----
        function showSWUpdateToast(worker) {
            const existing = document.getElementById('sw-update-toast');
            if (existing) existing.remove();

            const toast = document.createElement('div');
            toast.id = 'sw-update-toast';
            toast.innerHTML = `
                <div class="notif-content">
                    <i class="fa-solid fa-rotate"></i>
                    <span>新しいバージョンが公開されました</span>
                    <button id="sw-update-btn">今すぐ更新</button>
                    <button id="sw-update-close" aria-label="閉じる"><i class="fa-solid fa-xmark"></i></button>
                </div>
            `;
            document.body.appendChild(toast);

            document.getElementById('sw-update-btn').addEventListener('click', () => {
                worker.postMessage({ type: 'SKIP_WAITING' });
                toast.remove();
            });
            document.getElementById('sw-update-close').addEventListener('click', () => {
                toast.remove();
            });
        }

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => {
                        console.log('ServiceWorker registration successful with scope: ', reg.scope);

                        // ページ再読み込み時に既に waiting 中の SW がある場合
                        if (reg.waiting) {
                            showSWUpdateToast(reg.waiting);
                        }

                        // 新しい SW のインストールを検知
                        reg.addEventListener('updatefound', () => {
                            const newWorker = reg.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    showSWUpdateToast(newWorker);
                                }
                            });
                        });
                    })
                    .catch(err => console.log('ServiceWorker registration failed: ', err));

                // SW が切り替わったらページをリロードして最新版を適用
                let refreshing = false;
                navigator.serviceWorker.addEventListener('controllerchange', () => {
                    if (!refreshing) {
                        refreshing = true;
                        window.location.reload();
                    }
                });
            });
        }
    </script>
</body>

</html>
